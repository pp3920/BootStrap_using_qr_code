<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="p-5 m-0 border-0 d-flex align-items-center" style="background-color: hsl(212, 45%, 89%); height:100vh;">
        <div class="card mx-auto" style="max-width: 400px;">
            <img src="images/image-qr-code.png" class="card-img-top p-4 rounded-5" alt="QR Code" />
            <div class="card-body d-grid gap-0 row-gap-3">
                <h3 class="card-title text-center fw-bold fs-15">Improve your front-end skills by building projects
                </h3>
                <p class="card-text text-center fs-15 fw-normal text-secondary">
                    Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
